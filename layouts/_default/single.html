<!DOCTYPE html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <div class="page">
    {{ partial "header.html" . }}

    <div class="layout">
      {{ partial "sidebar.html" . }}

      <main class="content">
        <article class="post feature-post">
          {{ if .Title }}
            <h1>{{ .Title }}</h1>
          {{ end }}
          {{ if .Date }}
            <p class="dateline">{{ .Date.Format "Monday, 2 January 2006" }}</p>
          {{ end }}
          <div class="post-body">
            {{ .Content }}
          </div>
        </article>
      </main>
    </div>

    {{ partial "footer.html" . }}
  </div>
</body>
</html>
